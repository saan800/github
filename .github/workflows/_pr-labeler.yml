name: pr-labeler

on:
  workflow_call:
    inputs:
      harden-runner-policy:
        description: "The egress policy for the Harden Runner step. Defaults to 'block'"
        required: false
        type: string
        default: "block"
    secrets:
      GITHUB_ACCESS_TOKEN:
        description: "(ie: GITHUB_TOKEN) GitHub token"
        required: true

permissions:
  contents: read
  pull-requests: read

jobs:
  validate-pr-name:
    runs-on: ubuntu-latest

    permissions:
      pull-requests: write

    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          disable-sudo: true
          egress-policy: ${{ inputs.harden-runner-policy }}
          allowed-endpoints: >
            api.github.com:443

      # https://github.com/marketplace/actions/semantic-pull-request
      - name: Validate PR title
        uses: amannn/action-semantic-pull-request@48f256284bd46cdaab1048c3721360e808335d50 # v6.1.1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_ACCESS_TOKEN }}
        with:
          # Configure which types are allowed (newline-delimited).
          # Default: https://github.com/commitizen/conventional-commit-types
          types: |
            BREAKING CHANGE
            build
            chore
            ci
            dependencies
            docs
            feat
            fix
            perf
            refactor
            revert
            style
            test
          # Configure which scopes are allowed (newline-delimited).
          # These are regex patterns auto-wrapped in `^ $`.
          scopes: |
            (#\d{2,}|github-actions|nuget)
          # Configure that a scope must always be provided.
          requireScope: false
          # Configure additional validation for the subject based on a regex.
          # This example ensures the subject doesn't start with an uppercase character.
          subjectPattern: ^.{4,}$
          # If `subjectPattern` is configured, you can use this property to override
          # the default error message that is shown when the pattern doesn't match.
          # The variables `subject` and `title` can be used within the message.
          subjectPatternError: |
            The subject "{subject}" found in the pull request title "{title}"
            didn't match the configured pattern. Subject must be at least four characters long.
          # If the PR contains one of these newline-delimited labels, the
          # validation is skipped. If you want to rerun the validation when
          # labels change, you might want to use the `labeled` and `unlabeled`
          # event triggers in your workflow.
          ignoreLabels: |
            dependencies
          # allow the use of the "[WIP] feat: some new feature" syntax
          # wip: true

  label-pr:
    runs-on: ubuntu-latest
    needs: validate-pr-name

    permissions:
      pull-requests: write # to add labels to the PR

    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          disable-sudo: true
          egress-policy: ${{ inputs.harden-runner-policy }}
          allowed-endpoints: >
            api.github.com:443

      - name: Ensure Labels Exist
        uses: actions/github-script@v9
        with:
          github-token: ${{ secrets.GITHUB_ACCESS_TOKEN }}
          script: |
            const labelConfig = {
              breaking:      { color: "b60205", description: "Introduces a breaking change" },
              bug:           { color: "d73a4a", description: "Something isn't working" },
              configuration: { color: "fc27c6", description: "Pull request is updating configuration" },
              dependencies:  { color: "0366d6", description: "Dependency updates" },
              documentation: { color: "008672", description: "Improvements or additions to documentation" },
              duplicate:     { color: "cfd3d7", description: "This issue or pull request already exists" },
              feature:       { color: "a2eeef", description: "New feature or request" },
              "help wanted": { color: "0E8A16", description: "Extra attention is needed" },
              invalid:       { color: "e4e669", description: "This doesn't seem right" },
              misc:          { color: "7057ff", description: "Non-functional changes such as performance, tests and refactoring" },
              "no-release":  { color: "999999", description: "Changes don't require a release and wont be included in the release notes" },
              question:      { color: "d876e3", description: "Further information is requested" },
              wontfix:       { color: "ffffff", description: "This will not be worked on" },
            };

            for (const [name, { color, description }] of Object.entries(labelConfig)) {
              try {
                await github.rest.issues.getLabel({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  name
                });
              } catch (e) {
                if (e.status === 404) {
                  core.info(`Creating missing label: ${name} (${color})`);

                  await github.rest.issues.createLabel({
                    owner: context.repo.owner,
                    repo: context.repo.repo,
                    name,
                    color,
                    description
                  });
                } else {
                  throw e;
                }
              }
            }

      - name: Label PR
        uses: actions/github-script@v9
        with:
          github-token: ${{ secrets.GITHUB_ACCESS_TOKEN }}
          script: |
            const pr = context.payload.pull_request;
            const title = pr.title.toLowerCase();

            // === CONFIG ===
            const labelMapping = {
              breaking: ["breaking", "breaking change", "breaking changes"],
              bug: ["fix", "bug", "hotfix", "bugfix"],
              documentation: ["docs"],
              feature: ["feat", "feature"],
              dependencies: ["dependencies"],
              misc: ["perf", "refactor", "revert", "style", "test"],
              configuration: ["build", "ci"],
              "no-release": ["build", "chore", "ci"]
            };

            const breakingLabel = "breaking";

            // === HELPERS ===
            function extractType(title) {
              const match = title.match(/^(\w+)(?:\([^)]*\))?(!)?\s*:/);
              if (!match) return null;

              return {
                type: match[1],
                breaking: !!match[2]
              };
            }

            function resolveLabels(typeInfo) {
              const labels = new Set();
              if (!typeInfo) return labels;

              const { type, breaking } = typeInfo;

              for (const [label, keywords] of Object.entries(labelMapping)) {
                if (keywords.includes(type)) {
                  labels.add(label);
                }
              }

              if (breaking) {
                labels.add(breakingLabel);
              }

              return labels;
            }

            // === EXECUTION ===
            const typeInfo = extractType(title);
            const labels = resolveLabels(typeInfo);

            if (labels.size === 0) {
              core.info("No labels resolved from PR title.");
              return;
            }

            const labelList = Array.from(labels);
            core.info(`Resolved labels: ${labelList.join(", ")}`);

            const existingLabels = pr.labels.map(l => l.name);
            const labelsToAdd = labelList.filter(l => !existingLabels.includes(l));

            if (labelsToAdd.length > 0) {
              await github.rest.issues.addLabels({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: pr.number,
                labels: labelsToAdd
              });
            } else {
              core.info("No new labels to add.");
            }
