name: dotnet-build-test-pack-publish-nuget

on:
  workflow_call:
    inputs:
      harden-runner-policy:
        description: "The egress policy for the Harden Runner step. Defaults to 'block'"
        required: false
        type: string
        default: "block"
      working-directory:
        description: "The working directory for the job. Defaults to '.' which is the root of the repository. Do not include trailing '/'"
        required: false
        type: string
        default: "."
      os:
        description: The operating system to run non-matrix jobs on. e.g. "ubuntu-latest" or "windows-latest".
        required: false
        type: string
        default: ubuntu-latest
      dotnet-version-matrix:
        description: 'JSON array of dotnet-version/framework pairs. Must be on one line. eg ''[{ "dotnet-version": "9.0.x", "framework": "net9.0" }, { "dotnet-version": "10.0.x", "framework": "net10.0" }]'''
        required: false
        type: string
      dotnet-version:
        description: The dotnet version to run the non-matrix jobs with. e.g. "10.0.x".
        required: false
        type: string
        default: 10.0.x
      num-github-prerelease-packages-to-keep:
        description: "We cleanup github prerelease nuget packages. Configure how many to keep"
        type: number
        required: false
        default: 50
      codecov-slug:
        description: "Slug to upload code coverage results for Codecov. e.g. saan800/saansoft-correlationId"
        required: false
        type: string
      codecov-flag:
        description: "Flag to use for Codecov. e.g. unittests"
        required: false
        type: string
        default: unittests
      is-release-branch:
        description: 'If its a release branch or not. eg release from main check would be "github.ref==''refs/heads/main''" '
        type: boolean
        required: true
      force-release:
        description: "Force a release regardless of PR labels or branch"
        type: boolean
        required: false
        default: false
    secrets:
      NUGET_API_KEY:
        description: "API key for nuget.org. Required if upload-to-nuget is true"
        required: false
      CODECOV_TOKEN:
        description: "Token for CodeCov. Required if codecov-slug is set"
        required: false

permissions:
  contents: write
  packages: write
  pull-requests: read

jobs:
  ci-cd:
    permissions:
      contents: write
      packages: write
      pull-requests: read
    uses: ./.github/workflows/_dotnet-build-test-pack-publish-nuget.yml
    with:
      harden-runner-policy: ${{ inputs.harden-runner-policy }}
      working-directory: ${{ inputs.working-directory }}
      os: ${{ inputs.os }}
      dotnet-version-matrix: ${{ inputs.dotnet-version-matrix }}
      dotnet-version: ${{ inputs.dotnet-version }}
      num-github-prerelease-packages-to-keep: ${{ inputs.num-github-prerelease-packages-to-keep }}
      codecov-slug: ${{ inputs.codecov-slug }}
      codecov-flag: ${{ codecov-flag }}
      is-release-branch: ${{ inputs.is-release-branch }}
      force-release: ${{ inputs.force-release }}
    secrets: inherit
