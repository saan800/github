name: pr

on:
  pull_request:
    types: [opened, synchronize, reopened, edited]

permissions:
  contents: read
  pull-requests: read

jobs:
  pr-labels:
    permissions:
      contents: read
      pull-requests: write
    uses: ./.github/workflows/_pr-labeler.yml
    secrets: inherit

  pr-lint:
    permissions:
      contents: read
    uses: ./.github/workflows/_pr-lint.yml
    with:
      run-lint: true
    secrets: inherit
