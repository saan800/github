name: example-nuget-packages

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch: # 👈 manual trigger here to release
    inputs:
      force-release:
        description: "Force a release regardless of PR labels or branch"
        type: boolean
        required: false
        default: false

permissions:
  contents: read
  packages: write
  pull-requests: write

jobs:
  ci-cd:
    permissions:
      contents: write
      packages: write
      pull-requests: write
    uses: ./.github/workflows/dotnet-package-pr.yml
    with:
      working-directory: "./examples/NugetPackages"
      os: ubuntu-latest
      dotnet-version: 10.0.x
      is-release-branch: false # ${{ github.ref == 'refs/heads/main' }}
      force-release: ${{ github.event.inputs.force-release || false }}
    secrets: inherit
